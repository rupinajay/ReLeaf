name: releaf
description: A sustainable living gamification app

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  
  # Supabase
  supabase_flutter: ^1.10.4
  
  # Vision ML (Open Source)
  tflite_flutter: ^0.9.0
  image: ^4.0.17
  
  # UI & Navigation
  google_fonts: ^5.1.0
  flutter_svg: ^2.0.7
  camera: ^0.10.5+2
  image_picker: ^1.0.1
  cached_network_image: ^3.2.3
  
  # State Management
  provider: ^6.0.5
  
  # Utils
  path_provider: ^2.0.15
  permission_handler: ^10.4.3
  share_plus: ^7.0.2
  uuid: ^3.0.7
  intl: ^0.18.1
  flutter_dotenv: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/ml/vision_model/
    - .env